<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Véhicule - Visite Technique</title>
  <style>
    :root {
      --primary: #1d4ed8;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --secondary: #64748b;
      --dark: #0f172a;
      --border: #e2e8f0;
      --radius: 8px;
      --radius-lg: 12px;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      color: var(--dark);
      line-height: 1.5;
    }

    /* ============================================
       HEADER
       ============================================ */
    .user-header-bar {
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .user-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mini {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .user-header-left h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
    }

    .sync-mini {
      font-size: 11px;
      color: var(--success);
      font-weight: 500;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn-retour {
      padding: 8px 16px;
      border: 1px solid #e2e8f0;
      background: white;
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--secondary);
      cursor: pointer;
    }

    .btn-deconnexion {
      padding: 8px 16px;
      border: none;
      background: var(--primary);
      color: white;
      border-radius: var(--radius);
      font-size: 14px;
      cursor: pointer;
    }

    .user-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }

    /* ============================================
       CARTE VÉHICULE
       ============================================ */
    .vehicle-detail-card {
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 16px;
    }

    .vehicle-detail-header {
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      color: white;
      padding: 24px;
      text-align: center;
    }

    .vehicle-icon-big {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .vehicle-detail-header h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .vehicle-detail-header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .vehicle-detail-body {
      padding: 20px;
    }

    /* ============================================
       SECTION TITRE
       ============================================ */
    .detail-section {
      margin-bottom: 20px;
    }

    .detail-section-title {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--secondary);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ============================================
       ITEM DÉTAIL (STYLE EXACT CAPTURE)
       ============================================ */
    .detail-item {
      background: white;
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .detail-item-info {
      flex: 1;
    }

    .detail-item-label {
      font-size: 12px;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .detail-item-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
    }

    .detail-item-value.red {
      color: var(--danger);
    }

    .detail-item-value.green {
      color: var(--success);
    }

    /* ============================================
       BOUTON MODIFIER (STYLE EXACT CAPTURE)
       ============================================ */
    .btn-modifier {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--success);
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-modifier:hover {
      background: #059669;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-modifier:active {
      transform: translateY(0);
    }

    .btn-modifier .icon {
      font-size: 14px;
    }

    /* ============================================
       BARRE DE PROGRESSION
       ============================================ */
    .progress-container {
      margin-top: 8px;
    }

    .progress-bar {
      height: 8px;
      background: #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .progress-fill.red { background: var(--danger); }
    .progress-fill.orange { background: var(--warning); }
    .progress-fill.green { background: var(--success); }

    .progress-text {
      font-size: 12px;
      color: var(--secondary);
      margin-top: 4px;
      text-align: right;
    }

    /* ============================================
       MODAL
       ============================================ */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: white;
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: #f1f5f9;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 18px;
    }

    .modal-body { padding: 20px; }

    .modal-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn {
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: var(--success);
      color: white;
    }

    .btn-secondary {
      background: white;
      border: 1px solid var(--border);
      color: var(--dark);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: var(--radius);
      background: var(--dark);
      color: white;
      font-size: 14px;
      z-index: 2000;
      display: none;
    }

    .toast.show { display: block; }

    @media (max-width: 480px) {
      .detail-item {
        flex-direction: column;
        align-items: flex-start;
      }
      .btn-modifier {
        align-self: flex-end;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="user-header-bar">
    <div class="user-header-left">
      <div class="logo-mini">🚗</div>
      <div>
        <h3>Parc Auto TT</h3>
        <div class="sync-mini">🔄 Synchronisé</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-retour">← Retour</button>
      <button class="btn-deconnexion">🚪 Déconnexion</button>
    </div>
  </div>

  <div class="user-container">
    <!-- CARTE VÉHICULE -->
    <div class="vehicle-detail-card">
      <div class="vehicle-detail-header">
        <div class="vehicle-icon-big">🚗</div>
        <h2>17-355881</h2>
        <p>Volkswagen Golf 7 — Mr Kais Hassayoun</p>
      </div>

      <div class="vehicle-detail-body">
        <!-- INFORMATIONS GÉNÉRALES -->
        <div class="detail-section">
          <div class="detail-section-title">
            📊 INFORMATIONS GÉNÉRALES
          </div>

          <!-- KILOMÉTRAGE ACTUEL (existant) -->
          <div class="detail-item">
            <div class="detail-item-info">
              <div class="detail-item-label">KILOMÉTRAGE ACTUEL</div>
              <div class="detail-item-value">372 363 km</div>
            </div>
            <button class="btn-modifier" onclick="showKmModal()">
              <span class="icon">✏️</span>
              <span>Modifier</span>
            </button>
          </div>

          <!-- PROCHAINE VIDANGE (existant) -->
          <div class="detail-item">
            <div class="detail-item-info">
              <div class="detail-item-label">PROCHAINE VIDANGE</div>
              <div class="detail-item-value red">375 363 km</div>
              <div class="progress-container">
                <div class="progress-bar">
                  <div class="progress-fill red" style="width: 90%"></div>
                </div>
                <div class="progress-text">3 000 km restants</div>
              </div>
            </div>
          </div>

          <!-- PROCHAIN KIT CHAÎNE (existant) -->
          <div class="detail-item">
            <div class="detail-item-info">
              <div class="detail-item-label">PROCHAIN KIT CHAÎNE</div>
              <div class="detail-item-value red">390 000 km</div>
            </div>
          </div>

          <!-- 🔧 VISITE TECHNIQUE (NOUVEAU) -->
          <div class="detail-item">
            <div class="detail-item-info">
              <div class="detail-item-label">VISITE TECHNIQUE</div>
              <div class="detail-item-value green" id="visiteTechValue">✅ Valide jusqu'au 15/06/2026</div>
            </div>
            <button class="btn-modifier" onclick="showVisiteTechModal()">
              <span class="icon">✏️</span>
              <span>Modifier</span>
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- MODAL VISITE TECHNIQUE -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">🔧 Visite Technique</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Date dernière visite technique</label>
          <input type="date" class="form-control" id="visiteTechInput">
        </div>
        <div class="form-group">
          <label class="form-label">Date prochaine visite (auto +1 an)</label>
          <input type="date" class="form-control" id="visiteTechExpiryInput" readonly>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="saveVisiteTech()">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    // Données véhicule
    const vehicle = {
      visiteTechDate: '2025-06-15',
      visiteTechExpiry: '2026-06-15'
    };

    // Mettre à jour l'affichage
    function updateVisiteTechDisplay() {
      const today = new Date();
      const expiry = vehicle.visiteTechExpiry ? new Date(vehicle.visiteTechExpiry) : null;
      const el = document.getElementById('visiteTechValue');

      if (!expiry) {
        el.className = 'detail-item-value red';
        el.textContent = '⚠️ Non renseignée';
      } else if (expiry < today) {
        const days = Math.floor((today - expiry) / (1000 * 60 * 60 * 24));
        el.className = 'detail-item-value red';
        el.textContent = `❌ Expirée depuis ${days} jours`;
      } else {
        const days = Math.floor((expiry - today) / (1000 * 60 * 60 * 24));
        if (days <= 30) {
          el.className = 'detail-item-value red';
          el.textContent = `⏰ Expire dans ${days} jours`;
        } else {
          el.className = 'detail-item-value green';
          el.textContent = `✅ Valide jusqu'au ${formatDate(expiry)}`;
        }
      }
    }

    function formatDate(date) {
      return new Date(date).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    // Modal
    function showVisiteTechModal() {
      document.getElementById('visiteTechInput').value = vehicle.visiteTechDate || '';
      document.getElementById('visiteTechExpiryInput').value = vehicle.visiteTechExpiry || '';
      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal(e) {
      if (!e || e.target === document.getElementById('modalOverlay') || e.target.closest('.modal-close')) {
        document.getElementById('modalOverlay').classList.remove('active');
      }
    }

    function saveVisiteTech() {
      const date = document.getElementById('visiteTechInput').value;
      if (!date) {
        showToast('Veuillez saisir une date');
        return;
      }
      const expiry = new Date(date);
      expiry.setFullYear(expiry.getFullYear() + 1);
      vehicle.visiteTechDate = date;
      vehicle.visiteTechExpiry = expiry.toISOString().split('T')[0];
      updateVisiteTechDisplay();
      showToast('Visite technique mise à jour ✅');
      closeModal();
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Auto-calcul échéance
    document.getElementById('visiteTechInput').addEventListener('change', function() {
      const d = new Date(this.value);
      if (!isNaN(d)) {
        d.setFullYear(d.getFullYear() + 1);
        document.getElementById('visiteTechExpiryInput').value = d.toISOString().split('T')[0];
      }
    });

    // Init
    updateVisiteTechDisplay();
  </script>

</body>
</html>
