<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parc Auto — DRT Sfax</title>

<!-- ===== PWA META ===== -->
<meta name="application-name" content="Parc Auto DRT Sfax">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parc Auto">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a2342">
<meta name="msapplication-TileColor" content="#0a2342">
<meta name="msapplication-TileImage" content="icons/icon-144x144.png">

<!-- Manifest PWA -->
<link rel="manifest" href="manifest.json">

<!-- Icônes Apple -->
<link rel="apple-touch-icon" href="icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192.png">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-96x96.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/icon-72x72.png">

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0a2342;
    --accent: #e8453c;
    --gold: #f0a500;
    --success: #1db954;
    --warn: #ff9500;
    --bg: #f4f5f7;
    --card: #ffffff;
    --border: #e2e6ea;
    --text: #1a2332;
    --muted: #6b7a8d;
    --sidebar: #0a2342;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Barlow',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* ===== LOGIN SCREEN ===== */
  #loginScreen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, #0a2342 0%, #1a3a5c 50%, #0a2342 100%);
    position:relative; overflow:hidden;
  }
  #loginScreen::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 20% 50%, rgba(232,69,60,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(240,165,0,0.1) 0%, transparent 50%);
  }
  .login-card {
    background:rgba(255,255,255,0.05); backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.12); border-radius:20px;
    padding:50px 48px; width:420px; position:relative; z-index:1;
    box-shadow: 0 40px 80px rgba(0,0,0,0.4);
  }
  .login-logo {
    text-align:center; margin-bottom:36px;
  }
  .login-logo a { text-decoration:none; display:inline-block; }
  .car-icon {
    width:72px; height:72px; margin:0 auto 16px;
    background:linear-gradient(135deg,var(--accent),#ff6b35);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 24px rgba(232,69,60,0.4); transition:transform 0.3s;
  }
  .car-icon:hover { transform:scale(1.05); }
  .car-icon svg { width:38px; height:38px; fill:white; }
  .login-logo h1 {
    font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:28px;
    color:white; letter-spacing:2px; text-transform:uppercase;
  }
  .login-logo p { color:rgba(255,255,255,0.55); font-size:13px; letter-spacing:1px; margin-top:4px; }
  .login-tabs { display:flex; gap:8px; margin-bottom:28px; }
  .login-tab {
    flex:1; padding:10px; border:none; border-radius:10px; cursor:pointer;
    font-family:'Barlow',sans-serif; font-weight:600; font-size:13px; letter-spacing:0.5px;
    transition:all 0.2s;
    background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.5);
  }
  .login-tab.active { background:var(--accent); color:white; box-shadow:0 4px 12px rgba(232,69,60,0.4); }
  .form-group { margin-bottom:20px; }
  .form-group label { display:block; color:rgba(255,255,255,0.7); font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
  .form-group input {
    width:100%; padding:14px 18px; border-radius:10px; border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.08); color:white; font-family:'Barlow',sans-serif; font-size:15px;
    outline:none; transition:all 0.2s;
  }
  .form-group input::placeholder { color:rgba(255,255,255,0.3); }
  .form-group input:focus { border-color:var(--accent); background:rgba(255,255,255,0.12); }
  .btn-login {
    width:100%; padding:15px; background:linear-gradient(135deg,var(--accent),#c0392b);
    border:none; border-radius:10px; color:white; font-family:'Barlow Condensed',sans-serif;
    font-size:17px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    cursor:pointer; transition:all 0.2s; box-shadow:0 4px 16px rgba(232,69,60,0.4);
    margin-top:8px;
  }
  .btn-login:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(232,69,60,0.5); }
  .login-error { color:#ff6b6b; font-size:13px; margin-top:12px; text-align:center; display:none; }

  /* ===== USER SEARCH SCREEN ===== */
  #userScreen {
    min-height:100vh; display:none;
    background: linear-gradient(135deg, #0a2342 0%, #1a3a5c 100%);
    align-items:center; justify-content:center; flex-direction:column;
    position:relative; overflow:hidden;
  }
  #userScreen::before {
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse at 30% 70%, rgba(232,69,60,0.1) 0%, transparent 60%);
  }
  .user-header-bar {
    position:absolute; top:0; left:0; right:0; height:64px;
    background:rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:space-between; padding:0 32px;
    border-bottom:1px solid rgba(255,255,255,0.1);
  }
  .user-header-bar .logo-sm { display:flex; align-items:center; gap:12px; color:white; text-decoration:none; }
  .user-header-bar .logo-sm .dot { width:32px;height:32px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center; }
  .user-header-bar .logo-sm .dot svg { width:18px;height:18px;fill:white; }
  .user-header-bar .logo-sm span { font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:1px; }
  .btn-logout { background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-family:'Barlow',sans-serif;transition:all 0.2s; }
  .btn-logout:hover { background:rgba(255,255,255,0.2);color:white; }
  .user-search-box { position:relative; z-index:1; text-align:center; padding:24px; }
  .user-search-box h2 { font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:42px;color:white;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px; }
  .user-search-box p { color:rgba(255,255,255,0.55);font-size:15px;margin-bottom:36px; }
  .search-wrap { display:flex;gap:12px;max-width:520px;margin:0 auto 20px; }
  .search-wrap input {
    flex:1; padding:18px 24px; border-radius:14px;
    border:2px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.1);
    color:white; font-size:20px; font-family:'Barlow Condensed',sans-serif; font-weight:600;
    letter-spacing:2px; text-transform:uppercase; outline:none; transition:all 0.2s;
  }
  .search-wrap input::placeholder { color:rgba(255,255,255,0.3); font-size:16px; text-transform:none; letter-spacing:0; }
  .search-wrap input:focus { border-color:var(--accent);background:rgba(255,255,255,0.15); }
  .search-wrap button {
    padding:18px 28px;background:var(--accent);border:none;border-radius:14px;color:white;
    font-size:22px;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px rgba(232,69,60,0.4);
  }
  .search-wrap button:hover { transform:scale(1.05); }
  #vehicleResult { max-width:900px;width:100%;margin:0 auto; }

  /* ===== VEHICLE CARD (User view) ===== */
  .veh-card {
    background:rgba(255,255,255,0.05); backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.12); border-radius:20px; overflow:hidden;
    animation:slideUp 0.4s ease;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .veh-card-header {
    background:rgba(255,255,255,0.08); padding:24px 32px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid rgba(255,255,255,0.1);
  }
  .veh-card-header h3 { font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px;color:white;letter-spacing:2px; }
  .veh-card-header .model { color:rgba(255,255,255,0.55);font-size:14px;margin-top:2px; }
  .status-pills { display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end; }
  .pill {
    padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;
  }
  .pill.ok { background:rgba(29,185,84,0.2);color:#1db954;border:1px solid rgba(29,185,84,0.3); }
  .pill.warn { background:rgba(255,149,0,0.2);color:#ff9500;border:1px solid rgba(255,149,0,0.3); }
  .pill.danger { background:rgba(232,69,60,0.2);color:#e8453c;border:1px solid rgba(232,69,60,0.3); }
  .veh-card-body { padding:24px 32px; }
  .info-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px; }
  .info-item { background:rgba(255,255,255,0.05);border-radius:12px;padding:16px 18px; }
  .info-item .lbl { font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px; }
  .info-item .val { font-size:18px;font-weight:700;color:white; }
  .info-item .val.danger { color:var(--accent); }
  .info-item .val.warn { color:var(--warn); }
  .history-title { font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:rgba(255,255,255,0.8);letter-spacing:1px;text-transform:uppercase;margin-bottom:16px; }
  .history-list { display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto; }
  .history-list::-webkit-scrollbar { width:4px; }
  .history-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2);border-radius:2px; }
  .history-item {
    background:rgba(255,255,255,0.05); border-radius:10px;padding:12px 16px;
    display:flex;align-items:center;gap:16px;border-left:3px solid rgba(255,255,255,0.15);
  }
  .history-item .h-date { font-size:12px;color:rgba(255,255,255,0.45);min-width:90px; }
  .history-item .h-desc { font-size:14px;color:rgba(255,255,255,0.85);flex:1; }
  .history-item .h-km { font-size:12px;color:rgba(255,255,255,0.5);min-width:80px;text-align:right; }
  .history-item.vidange { border-left-color:var(--gold); }
  .history-item.chaine { border-left-color:#4fc3f7; }
  .history-item.visite { border-left-color:var(--success); }
  .history-item.repair { border-left-color:rgba(255,255,255,0.2); }
  .no-result { text-align:center;padding:40px;color:rgba(255,255,255,0.4); }
  .no-result svg { width:60px;height:60px;margin-bottom:16px;opacity:0.3; }

  /* ===== ADMIN LAYOUT ===== */
  #adminScreen { display:none; min-height:100vh; }
  .admin-layout { display:flex;min-height:100vh; }
  .sidebar {
    width:260px; background:var(--sidebar); position:fixed;top:0;left:0;bottom:0;
    display:flex;flex-direction:column; z-index:100; overflow-y:auto;
  }
  .sidebar-logo {
    padding:24px 20px; border-bottom:1px solid rgba(255,255,255,0.08);
    display:flex;align-items:center;gap:14px;text-decoration:none;
  }
  .sidebar-logo .logo-icon { width:42px;height:42px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
  .sidebar-logo .logo-icon svg { width:22px;height:22px;fill:white; }
  .sidebar-logo .logo-text h2 { font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:white;letter-spacing:1px;text-transform:uppercase; }
  .sidebar-logo .logo-text p { font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.5px; }
  .sidebar-nav { flex:1;padding:16px 12px; }
  .nav-section { margin-bottom:8px; }
  .nav-label { font-size:10px;font-weight:700;color:rgba(255,255,255,0.25);letter-spacing:2px;text-transform:uppercase;padding:8px 12px 6px; }
  .nav-item {
    display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;
    color:rgba(255,255,255,0.55);font-size:14px;font-weight:500;cursor:pointer;
    transition:all 0.2s;text-decoration:none;margin-bottom:2px;
  }
  .nav-item:hover { background:rgba(255,255,255,0.07);color:white; }
  .nav-item.active { background:rgba(232,69,60,0.2);color:var(--accent);font-weight:600; }
  .nav-item svg { width:18px;height:18px;flex-shrink:0; }
  .sidebar-bottom { padding:16px 12px;border-top:1px solid rgba(255,255,255,0.08); }
  .sidebar-user { display:flex;align-items:center;gap:10px;padding:10px 12px; }
  .sidebar-user .avatar { width:36px;height:36px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:white; }
  .sidebar-user .info .name { font-size:14px;font-weight:600;color:white; }
  .sidebar-user .info .role { font-size:11px;color:rgba(255,255,255,0.4); }
  .sidebar-logout { display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;color:rgba(255,255,255,0.4);cursor:pointer;font-size:13px;transition:all 0.2s;margin-top:4px; }
  .sidebar-logout:hover { color:var(--accent); }
  .sidebar-logout svg { width:16px;height:16px; }
  .main-content { margin-left:260px;flex:1;padding:32px; }
  .page-header { margin-bottom:28px; }
  .page-header h1 { font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:34px;color:var(--text);letter-spacing:1px;text-transform:uppercase; }
  .page-header p { color:var(--muted);font-size:14px;margin-top:4px; }
  .admin-page { display:none; }
  .admin-page.active { display:block; }

  /* ===== STATS CARDS ===== */
  .stats-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:28px; }
  .stat-card { background:var(--card);border-radius:16px;padding:22px 24px;border:1px solid var(--border);position:relative;overflow:hidden; }
  .stat-card::after { content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:0.08; }
  .stat-card.red::after { background:var(--accent); }
  .stat-card.green::after { background:var(--success); }
  .stat-card.gold::after { background:var(--gold); }
  .stat-card.blue::after { background:#4fc3f7; }
  .stat-card .s-label { font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px; }
  .stat-card .s-val { font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:800;color:var(--text); }
  .stat-card .s-sub { font-size:12px;color:var(--muted);margin-top:4px; }
  .stat-card .s-icon { position:absolute;top:20px;right:20px;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center; }
  .stat-card.red .s-icon { background:rgba(232,69,60,0.1);color:var(--accent); }
  .stat-card.green .s-icon { background:rgba(29,185,84,0.1);color:var(--success); }
  .stat-card.gold .s-icon { background:rgba(240,165,0,0.1);color:var(--gold); }
  .stat-card.blue .s-icon { background:rgba(79,195,247,0.1);color:#4fc3f7; }
  .stat-card .s-icon svg { width:22px;height:22px; }

  /* ===== TABLE ===== */
  .card { background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:24px; }
  .card-header { padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; }
  .card-header h3 { font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--text);letter-spacing:0.5px;text-transform:uppercase; }
  .card-header .actions { display:flex;gap:10px;align-items:center; }
  .search-input {
    padding:9px 16px;border-radius:8px;border:1px solid var(--border);font-size:14px;
    font-family:'Barlow',sans-serif;outline:none;transition:all 0.2s;width:220px;
  }
  .search-input:focus { border-color:var(--accent); }
  .btn { padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;transition:all 0.2s; }
  .btn-primary { background:var(--accent);color:white; }
  .btn-primary:hover { background:#c0392b; }
  .btn-secondary { background:var(--bg);color:var(--text);border:1px solid var(--border); }
  .btn-secondary:hover { border-color:var(--accent);color:var(--accent); }
  .btn-sm { padding:6px 14px;font-size:12px; }
  .btn-icon { width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:8px; }
  .btn-icon svg { width:15px;height:15px; }
  table { width:100%;border-collapse:collapse; }
  thead th { background:#f8f9fb;padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border); }
  tbody tr { border-bottom:1px solid var(--border);transition:background 0.15s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:#f8f9fb; }
  tbody td { padding:13px 16px;font-size:14px;color:var(--text); }
  .badge { display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700; }
  .badge.ok { background:#e8f8ef;color:#1db954; }
  .badge.warn { background:#fff3e0;color:#ff9500; }
  .badge.danger { background:#ffeaea;color:var(--accent); }
  .badge::before { content:'';width:6px;height:6px;border-radius:50%;background:currentColor; }
  .mat-tag { font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;color:var(--primary); }

  /* ===== MODAL ===== */
  .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px); }
  .modal-overlay.open { display:flex; }
  .modal { background:white;border-radius:20px;width:680px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 40px 80px rgba(0,0,0,0.3); }
  .modal-header { padding:24px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; }
  .modal-header h3 { font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--text);letter-spacing:1px;text-transform:uppercase; }
  .modal-close { width:36px;height:36px;border-radius:8px;border:none;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--muted);transition:all 0.2s; }
  .modal-close:hover { background:var(--accent);color:white; }
  .modal-body { padding:28px; }
  .form-row { display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px; }
  .form-row.full { grid-template-columns:1fr; }
  .field label { display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px; }
  .field input,.field select,.field textarea { width:100%;padding:11px 14px;border-radius:8px;border:1px solid var(--border);font-size:14px;font-family:'Barlow',sans-serif;outline:none;transition:all 0.2s; }
  .field input:focus,.field select:focus,.field textarea:focus { border-color:var(--accent); }
  .field textarea { height:90px;resize:vertical; }
  .modal-footer { padding:20px 28px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px; }
  .section-divider { font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin:20px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border); }

  /* ===== ALERT BANNER ===== */
  .alert-banner { background:#fff3cd;border:1px solid #ffc107;border-radius:12px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px; }
  .alert-banner svg { width:20px;height:20px;color:#ff9500;flex-shrink:0; }
  .alert-banner .txt { font-size:14px;color:#7a5000; }
  .alert-banner .count { font-weight:700;color:#d68000; }

  /* ===== FILTER BAR ===== */
  .filter-bar { display:flex;gap:10px;
